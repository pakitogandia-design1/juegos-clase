<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de prueba</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef4ff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .caja {
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      max-width: 500px;
    }
    h1 {
      margin-top: 0;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    #mensaje {
      margin-top: 20px;
      font-weight: bold;
      color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="caja">
    <h1>Juego de prueba</h1>
    <p>Esta es mi primera app publicada para el alumnado.</p>
    <button onclick="mostrarMensaje()">Pulsar</button>
    <div id="mensaje"></div>
  </div>

  <script>
    function mostrarMensaje() {
      document.getElementById("mensaje").textContent = "¡Funciona correctamente!";
    }
  </script>
</body>
</html>
