<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>La Grúa del Destino</title>
  <link rel="stylesheet" href="src/styles.css?v=autoaventura3" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    #autoaventura-html-btn{
      position:fixed; z-index:999999; left:50%; bottom:22px; transform:translateX(-50%);
      padding:14px 22px; min-width:260px; border:2px solid #ffd37a; border-radius:14px;
      background:linear-gradient(180deg,#3a2405,#111); color:#fff7d6; font:800 16px/1.1 Arial, sans-serif;
      box-shadow:0 8px 30px rgba(0,0,0,.55); cursor:pointer; letter-spacing:.5px;
    }
    #autoaventura-html-btn small{display:block; font-weight:400; color:#ffd37a; margin-top:4px; font-size:12px;}
    body.auto-running #autoaventura-html-btn{display:none;}
  </style>
</head>
<body>
  <div id="game-root"></div>
  <button id="autoaventura-html-btn" type="button">AUTOAVENTURA<small>modo automático · empezar ahora</small></button>
  <script>
    window.__GRUA_FORCE_AUTO__ = new URLSearchParams(location.search).has('autoaventura');
    window.__startGruaAutoaventura = function(){
      localStorage.removeItem('la-grua-del-destino-save');
      document.body.classList.add('auto-running');
      let tries = 0;
      const go = () => {
        tries++;
        if (window.__GRUA_GAME__ && window.__GRUA_GAME__.scene) {
          window.__GRUA_GAME__.scene.start('GameScene', { newGame:true, autoAdventure:true });
        } else if (tries < 80) {
          setTimeout(go, 100);
        } else {
          location.href = location.pathname + '?autoaventura=1';
        }
      };
      go();
    };
    document.getElementById('autoaventura-html-btn').addEventListener('click', window.__startGruaAutoaventura);
  </script>
  <script type="module" src="src/main.js?v=autoaventura3"></script>
</body>
</html>
