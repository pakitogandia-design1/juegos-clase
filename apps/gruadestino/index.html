<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>La Grúa del Destino (AUTOAVENTURA CANVAS)</title>
  <meta name="description" content="Autojuego narrativo en HTML Canvas basado en La Grúa del Destino.">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div>
        <p class="eyebrow">Autójuego narrativo · HTML Canvas · Ligero</p>
        <h1>LA GRÚA DEL DESTINO <span>(AUTOAVENTURA)</span></h1>
      </div>
      <div class="header-status" id="headerStatus">Listo para empezar</div>
    </header>

    <main class="game-shell">
      <canvas id="gameCanvas" aria-label="La Grúa del Destino Autoaventura" role="img"></canvas>

      <div class="controls" id="menuControls">
        <button id="startBtn" class="primary">Empezar</button>
        <button id="continueBtn">Continuar</button>
        <button id="resetBtn" class="danger">Borrar progreso</button>
      </div>

      <div class="controls hidden" id="gameControls">
        <button id="menuBtn">Menú</button>
        <button id="restartBtn">Reiniciar</button>
        <button id="skipBtn">Saltar escena +</button>
        <button id="nextBtn" class="primary grow">Siguiente paso ▶</button>
      </div>

      <div class="controls hidden" id="endingControls">
        <button id="againBtn" class="primary">Volver a empezar</button>
        <button id="endingMenuBtn">Menú</button>
      </div>

      <p class="hint">Consejo: también puedes usar <strong>Espacio</strong> o <strong>Enter</strong> para avanzar. En móvil, simplemente toca los botones.</p>
    </main>
  </div>

  <script src="src/chapters.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
